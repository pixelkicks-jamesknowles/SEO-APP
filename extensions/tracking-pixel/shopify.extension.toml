api_version = "2026-07"
uid = "5d23d7eb-259c-2ecc-9355-3be596a7ce72d9323f16"

# Web Pixel extension — sandboxed (strict) tracking. Subscribes to Shopify's standard
# customer events (incl. checkout & purchase, which theme JS can't reach) and routes them
# to the enabled platforms per the event matrix. Consent is enforced at runtime in
# src/index.js via init.customerPrivacy. Settings are written by the app via
# webPixelCreate/Update (see app/routes/app.tracking.jsx action TODO).
[[extensions]]
type = "web_pixel_extension"
name = "pixelify-tracking"
handle = "tracking-pixel"
runtime_context = "strict"

  [extensions.settings]
  type = "object"

    # `fields` is an object keyed by setting name (not an array). Keys must match the
    # settings.<key> reads in src/index.js.
    [extensions.settings.fields.gtmId]
    name = "GTM container ID"
    type = "single_line_text_field"

    [extensions.settings.fields.ga4Id]
    name = "GA4 measurement ID"
    type = "single_line_text_field"

    [extensions.settings.fields.metaPixelId]
    name = "Meta Pixel ID"
    type = "single_line_text_field"

    [extensions.settings.fields.eventMatrix]
    name = "Per-platform event matrix (JSON)"
    type = "single_line_text_field"

    [extensions.settings.fields.consentMode]
    name = "Gate on consent"
    type = "single_line_text_field"

    [extensions.settings.fields.proxyUrl]
    name = "Server-side ingest URL (app proxy)"
    type = "single_line_text_field"
