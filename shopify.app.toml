# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
#
# ⚠️ Before `shopify app deploy` to production, replace `https://example.com` with your
# deployed host in application_url, [auth].redirect_urls, and [app_proxy].url (same origin).
# During `shopify app dev`, automatically_update_urls_on_dev keeps these pointed at the tunnel.

client_id = "708d7107539ef297a6230ea9b0716a2a"
name = "Pixel Kicks Tracking"
application_url = "https://tracking.pixelkicks.co.uk"
embedded = true

[build]
automatically_update_urls_on_dev = true

[access_scopes]
# Tracking-only (SEO features archived to branch archive/seo-full-featured).
#   write_pixels         — create/update the Web Pixel (webPixelCreate)
#   read_customer_events — the Web Pixel subscribes to storefront customer events
#   read_orders          — orders/paid + orders/edited + refunds/cancellations webhooks
#   read_fulfillments    — the fulfillments/create lifecycle webhook (order_fulfilled)
#   read_products        — read the SellingPlan deliveryPolicy (subscription cadence → subscription_interval);
#                          the order's LineItemSellingPlan is under read_orders, but the SellingPlan object
#                          itself is products-domain, so resolveIntervalDays needs read_products.
#   read_all_orders      — revenue-by-channel BACKFILL. read_orders only exposes the LAST 60 DAYS, but an
#                          established subscriber's ACQUIRING order (the one carrying the customer journey /
#                          UTMs) is often years old — so without this we can never recover which channel
#                          actually won them, and their renewal revenue reports as "(unattributed)" forever.
#                          ⚠️ Shopify must APPROVE this scope (Partner Dashboard → API access → request it,
#                          with a justification). Until approved it is simply not granted and the backfill
#                          degrades gracefully to the 60-day window.
# (Changing scopes triggers merchant re-consent on next deploy / dev restart.)
scopes = "write_pixels,read_customer_events,read_orders,read_all_orders,read_fulfillments,read_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://tracking.pixelkicks.co.uk/auth/callback",
  "https://tracking.pixelkicks.co.uk/auth/shopify/callback",
  "https://tracking.pixelkicks.co.uk/api/auth/callback",
]

[webhooks]
api_version = "2026-04"

  # Deployed to Railway. To go back to `shopify app dev --use-localhost`, re-comment the blocks below
  # (Shopify rejects localhost/internal hosts for webhook + proxy URIs); for tunnel dev use plain
  # `shopify app dev`, which works with these in place.

  [webhooks.privacy_compliance]
  customer_deletion_url = "/webhooks/customers/redact"
  customer_data_request_url = "/webhooks/customers/data_request"
  shop_deletion_url = "/webhooks/shop/redact"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Order webhooks (need Protected Customer Data access, granted in Partner Dashboard → API access).
  [[webhooks.subscriptions]]          # server-side subscription_purchase → GA4 (seo-subscription-tracking-v1)
  uri = "/webhooks/orders/paid"
  topics = [ "orders/paid" ]

  [[webhooks.subscriptions]]          # GA4 refund event (negative conversions)
  uri = "/webhooks/refunds/create"
  topics = [ "refunds/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/cancelled"
  topics = [ "orders/cancelled" ]

  [[webhooks.subscriptions]]          # order_edited lifecycle event (post-purchase value change → GA4)
  uri = "/webhooks/orders/edited"
  topics = [ "orders/edited" ]

  [[webhooks.subscriptions]]          # order_fulfilled lifecycle event (fulfillment → GA4)
  uri = "/webhooks/fulfillments/create"
  topics = [ "fulfillments/create" ]

# App Proxy — the Web Pixel + SEO-engagement embed beacon to /apps/pixelify-seo/track, which Shopify
# signs and forwards here. `url` is the deployed host (same origin as application_url); subpath/prefix
# MUST match proxyPath in app/routes/app.tracking.jsx + the seo-engagement embed.
[app_proxy]
url = "https://tracking.pixelkicks.co.uk/proxy"
subpath = "pixelify-seo"
prefix = "apps"
